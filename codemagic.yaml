workflows:
  ios-app-store:
    name: Tastebuddy iOS App Store Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      # ⚠️ This name MUST exactly match the name you typed in the Codemagic Integrations menu!
      app_store_connect: tastebuddy-api-key
    environment:
      node: 20
      xcode: latest
      # Notice we removed the ios_signing block here!
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build Web Assets
        script: npm run build
      - name: Sync Capacitor iOS
        script: npx cap sync ios
        
      # 💥 THIS IS THE CRITICAL SCRIPT THAT FIXES YOUR ERROR 💥
      - name: Fetch and Create Apple Certificates
        script: |
          app-store-connect fetch-signing-files "com.tastebuddy.app" \
            --type IOS_APP_STORE \
            --create
            
      - name: Codemagic Auto-Signing (The SPM Fix)
        script: |
          xcode-project use-profiles
          
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"
            
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log