workflows:
  ios-app-store:
    name: Tastebuddy iOS App Store Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    
    # 💥 We DELETED the integrations block! 💥
    
    environment:
      node: latest
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tastebuddy.app
        
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build Web Assets
        script: npm run build
      - name: Sync Capacitor iOS
        script: npx cap sync ios
            
      - name: Codemagic Auto-Signing (The SPM Fix)
        script: |
          xcode-project use-profiles
          
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"
            
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log