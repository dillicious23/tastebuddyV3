workflows:
  ios-app-store:
    name: Tastebuddy iOS App Store Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    
    # 💥 Put the API key back so Codemagic can log into Apple to upload the app 💥
    integrations:
      app_store_connect: tastebuddy-api-key 
    
    environment:
      node: 22
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tastebuddy.app
        
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build Web Assets
        script: npm run build
      - name: Sync Capacitor iOS
        script: npx cap sync ios
            
      - name: Codemagic Auto-Signing (The SPM Fix)
        script: |
          xcode-project use-profiles
          
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"
            
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      
    # 💥 ADD THIS PUBLISHING BLOCK AT THE VERY BOTTOM 💥
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true