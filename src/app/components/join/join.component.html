<!-- src/app/components/join/join.component.html -->
<div class="screen join-screen">

  <!-- Back -->
  <div class="back-row safe-top" (click)="goBack()">
    <svg width="14" height="14" viewBox="0 0 14 14">
      <path d="M9 3L5 7l4 4" stroke="#475569" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
    <span>Back</span>
  </div>

  <div class="join-body">
    <h1 class="join-title">Join a session</h1>
    <p class="join-sub">Enter the room code your friend shared</p>

    <!-- Code boxes -->
    <div class="code-boxes">
      <div *ngFor="let i of [0,1,2,3]" [ngClass]="boxClass(i)" class="code-box">
        {{ boxChar(i) }}
      </div>
    </div>

    <!-- Error / hint -->
    <div class="feedback error-msg" *ngIf="error()">
      <svg width="13" height="13" viewBox="0 0 13 13">
        <circle cx="6.5" cy="6.5" r="5" stroke="#F87171" stroke-width="1.1" />
        <path d="M6.5 4v2.5" stroke="#F87171" stroke-width="1.4" stroke-linecap="round" />
        <circle cx="6.5" cy="8.5" r=".6" fill="#F87171" />
      </svg>
      Room not found · double-check the code
    </div>
    <div class="feedback hint" *ngIf="!error()">
      Letters and numbers · not case sensitive
    </div>

    <!-- Loading state -->
    <div class="loading-block" *ngIf="loading()">
      <div class="spinner"></div>
      <div>
        <div class="loading-title">Joining room…</div>
        <div class="loading-sub" style="font-size:10px;color:var(--tx5)">{{ chars().join('') }}</div>
      </div>
    </div>

    <!-- Keypad -->
    <div class="keypad">
      <ng-container *ngFor="let row of PAD">
        <div class="key-row">
          <button *ngFor="let k of row" class="key" [class.key-action]="k === '⌫' || k === 'A–Z'" (click)="tap(k)">
            {{ k }}
          </button>
        </div>
      </ng-container>
    </div>

    <!-- Divider -->
    <div class="divider">
      <div></div><span>or</span>
      <div></div>
    </div>

    <!-- Link option -->
    <div class="link-option">
      <div class="link-icon">
        <svg width="14" height="14" viewBox="0 0 14 14">
          <path d="M6 8.5a3 3 0 0 0 4 .3l2-2a3 3 0 0 0-4.24-4.24l-1 1" stroke="#4ADE80" stroke-width="1.3"
            stroke-linecap="round" stroke-linejoin="round" />
          <path d="M8 5.5a3 3 0 0 0-4-.3l-2 2a3 3 0 0 0 4.24 4.24l1-1" stroke="#4ADE80" stroke-width="1.3"
            stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
      <div>
        <div class="link-title">Got a link?</div>
        <div class="link-sub">Tap it in iMessage — skips this screen entirely</div>
      </div>
    </div>
  </div>
</div>
